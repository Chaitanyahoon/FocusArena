name: Mobile Android Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build type
        required: true
        default: preview
        type: choice
        options:
          - preview
      create_release:
        description: Create a GitHub release for the APK
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: focusarena-android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-preview-${{ github.run_number }}
          name: FocusArena Mobile APK ${{ github.run_number }}
          body: |
            Android standalone APK generated natively via GitHub Actions.
          files: mobile/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
